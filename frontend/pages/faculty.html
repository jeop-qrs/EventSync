<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="/frontend/assets/img/EventSync logo.webp"
      type="image/png"
      sizes="192x192"
    />
    <title>Faculty Login - EventSync</title>
    <link rel="stylesheet" href="/frontend/assets/css/faculty.css" />
  </head>
  <body>
    <div class="landing-overlay">
      <div class="landing-card">
        <p class="landing-subtitle">FACULTY LOGIN</p>
        <h1 class="landing-title">Faculty Portal</h1>
        <p class="landing-copy">Please sign in with your account</p>

        <div class="form-card">
          <form id="facultyLoginForm">
            <div class="form-group">
              <label for="facultyUsername">Username</label>
              <input type="text" id="facultyUsername" class="form-control" required placeholder="e.g., Hoogie" />
            </div>
            <div class="form-group">
              <label for="facultyPassword">Password</label>
              <input type="password" id="facultyPassword" class="form-control" required placeholder="Enter your password" />
            </div>
            <div class="form-actions">
              <button type="submit" class="btn">Login</button>
              <a id="facultyLoginBackBtn" href="index.html" class="btn btn-secondary">Back</a>
            </div>
          </form>
        </div>

        <p class="landing-terms">
          Use your faculty credentials to log in.
        </p>
      </div>
    </div>

    <script src="/frontend/assets/js/shared.js"></script>
    <script src="/frontend/assets/js/script.js"></script>
  </body>
</html>
