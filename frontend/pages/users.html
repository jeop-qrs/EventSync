<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Login - EventSync</title>
    <link rel="stylesheet" href="/frontend/assets/css/style.css" />
  </head>
  <body>
    <div class="landing-overlay">
      <div class="landing-card">
        <p class="landing-subtitle">STUDENT LOGIN</p>
        <h1 class="landing-title" style="font-size:2rem">Student Portal</h1>
        <p class="landing-copy">Please sign in with your account</p>

        <div class="form-card" style="max-width:480px; margin:16px auto;">
          <form id="studentLoginForm">
            <div class="form-group">
              <label for="studentNumber">Student Number</label>
              <input type="text" id="studentNumber" class="form-control" required placeholder="e.g., 2021001234" />
            </div>
            <div class="form-group">
              <label for="studentPassword">Password</label>
              <input type="password" id="studentPassword" class="form-control" required placeholder="Enter your password" />
            </div>
            <div class="form-actions">
              <button type="submit" class="btn">Login</button>
              <a href="index.html" class="btn btn-secondary">Back</a>
            </div>
          </form>
        </div>

        <p class="landing-terms" style="margin-top:18px;">
          Use your institutional credentials to log in.
        </p>
      </div>
    </div>

    <script src="/frontend/assets/js/script.js"></script>
  </body>
</html>
